<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海外内容运营 AI 面板（合规版）</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fc; --card: #ffffff; --text: #222; --muted: #666;
      --primary: #4f46e5; --primary-hover: #4338ca; --border: #e5e7eb;
      --ok: #047857; --warn: #b45309; --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { max-width: 920px; margin: 40px auto; padding: 0 16px 40px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.04); }
    h1 { margin: 0 0 10px; font-size: 26px; }
    .desc { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .topbar h1 { margin: 0; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 6px; }
    .tab { background: #f1f5ff; color: #1f2a62; border: 1px solid #dfe6ff; padding: 9px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; cursor: pointer; user-select: none; }
    .tab[aria-selected="true"] { background: var(--primary); border-color: var(--primary); color: #fff; }
    .panel { display: none; margin-top: 14px; }
    .panel.active { display: block; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
    .field input, .field select, textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; font-size: 14px; outline: none; background: #fff; }
    .field input:focus, .field select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    textarea { min-height: 140px; resize: vertical; line-height: 1.45; }
    .actions { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; }
    button { border: 0; border-radius: 10px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-main { background: var(--primary); color: #fff; } .btn-main:hover { background: var(--primary-hover); }
    .btn-sub { background: #eceffb; color: #2b2f4a; } .btn-danger { background: #fee2e2; color: #7f1d1d; }
    .meta { margin-top: 10px; font-size: 13px; color: var(--ok); min-height: 20px; }
    .meta.warn { color: var(--warn); } .meta.danger { color: var(--danger); }
    .result { margin-top: 20px; display: grid; gap: 12px; }
    .idea { border: 1px solid var(--border); border-radius: 12px; padding: 14px; background: #fff; }
    .idea h3 { margin: 0 0 8px; font-size: 15px; color: #111827; } .idea p { margin: 6px 0; font-size: 14px; }
    .muted { color: var(--muted); }
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 14px; }
    .kpi { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: #fff; }
    .kpi .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .kpi .value { font-size: 22px; font-weight: 800; letter-spacing: 0.2px; }
    .bar { height: 10px; background: #eef2ff; border: 1px solid #e5e7eb; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .bar > div { height: 100%; background: var(--primary); width: 0%; }
    .list { margin: 10px 0 0; padding-left: 18px; } .list li { margin: 6px 0; font-size: 14px; }
    dialog { width: min(720px, calc(100vw - 24px)); border: 1px solid var(--border); border-radius: 14px; padding: 0; box-shadow: 0 18px 45px rgba(0,0,0,0.25); }
    dialog::backdrop { background: rgba(0,0,0,0.45); }
    .dialog-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .dialog-head h2 { margin: 0; font-size: 16px; } .dialog-body { padding: 16px; display: grid; gap: 12px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container"><div class="card">
  <div class="topbar"><h1>海外内容运营 AI 面板（合规版）</h1><div class="actions" style="margin-top:0"><button id="openSettingsBtn" class="btn-sub">🔒 API 安全架构说明</button></div></div>
  <p class="desc">合规前提：数据都由你<strong>手动粘贴</strong>，工具只做分析与总结。未配置 API Key 时也能用：会输出<strong>可复制提示词</strong>。</p>
  <div class="tabs" role="tablist">
    <button class="tab" id="tab-ideas" role="tab" aria-selected="true">脚本灵感</button>
    <button class="tab" id="tab-emotion" role="tab" aria-selected="false">情绪翻译官</button>
    <button class="tab" id="tab-competitor" role="tab" aria-selected="false">竞品弱点雷达</button>
    <button class="tab" id="tab-hotspots" role="tab" aria-selected="false">本土化热点日历</button>
  </div>
  <div id="panel-ideas" class="panel active">
    <p class="desc" style="margin-top:0">输入目标市场与品类，生成可直接拍的 TikTok 脚本拆解。</p>
    <div class="grid">
      <div class="field"><label>目标国家</label><input id="country" placeholder="例如：墨西哥 / 美国" /></div>
      <div class="field"><label>产品品类</label><input id="category" placeholder="例如：美妆 / 3C" /></div>
      <div class="field"><label>生成条数</label><select id="count"><option value="3">3条</option><option value="5" selected>5条</option><option value="8">8条</option></select></div>
      <div class="field"><label>脚本风格</label><select id="tone"><option value="实用测评">实用测评</option><option value="反差剧情">反差剧情</option></select></div>
      <div class="field"><label>生成方式</label><select id="ideaMode"><option value="model" selected>优先大模型</option><option value="local">只用本地模板</option></select></div>
      <div class="field"><label>口吻偏好</label><select id="ideaVoice"><option value="更口语">更口语</option><option value="更专业">更专业</option></select></div>
    </div>
    <div class="actions"><button id="generateBtn" class="btn-main">生成灵感</button><button id="copyBtn" class="btn-sub">复制全部</button></div>
    <div id="status" class="meta"></div><div id="result" class="result"></div>
  </div>
  <div id="panel-emotion" class="panel">
    <p class="desc" style="margin-top:0">粘贴海外用户评论，输出情绪仪表盘与机会卡片。</p>
    <div class="field"><label>粘贴评论</label><textarea id="emotionInput" placeholder="每行一条评论..."></textarea></div>
    <div class="actions"><button id="emotionAnalyzeBtn" class="btn-main">一键分析</button><button id="emotionClearBtn" class="btn-danger">清空</button></div>
    <div id="emotionStatus" class="meta"></div><div id="emotionResult" class="result"></div>
  </div>
  <div id="panel-competitor" class="panel">
    <p class="desc" style="margin-top:0">粘贴竞品公开信息，输出弱点雷达。</p>
    <div class="field"><label>粘贴信息</label><textarea id="compInput" placeholder="链接或评论..."></textarea></div>
    <div class="actions"><button id="compAnalyzeBtn" class="btn-main">生成雷达</button><button id="compClearBtn" class="btn-danger">清空</button></div>
    <div id="compStatus" class="meta"></div><div id="compResult" class="result"></div>
  </div>
  <div id="panel-hotspots" class="panel">
    <p class="desc" style="margin-top:0">为目标国家整理未来一周的公共文化趋势。</p>
    <div class="grid">
      <div class="field"><label>目标国家</label><input id="hotCountry" placeholder="墨西哥" /></div>
      <div class="field"><label>未来几天</label><select id="hotDays"><option value="7">7天</option></select></div>
    </div>
    <div class="actions"><button id="hotGenBtn" class="btn-main">生成日历</button></div>
    <div id="hotStatus" class="meta"></div><div id="hotResult" class="result"></div>
  </div>
</div></div>
<dialog id="settingsDialog"><form method="dialog"><div class="dialog-head"><h2>🔒 API 安全架构</h2><button class="btn-sub" value="cancel">关闭</button></div><div class="dialog-body"><p>本项目采用后端中转：<strong>前端→Netlify Function→智谱AI</strong>。API Key 存储在环境变量中，不暴露在前端。</p></div></form></dialog>
<script>
// ==================== 核心：调用后端中转接口 ====================
async function callAI({ system, user, temperature = 0.75, maxTokens = 2000 }) {
  const t = temperature;
  const maxT = maxTokens;
  const resp = await fetch('/.netlify/functions/ai-generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: "glm-4-flash", temperature: t, max_tokens: maxT, messages: [{ role: "system", content: system }, { role: "user", content: user }] })
  });
  if (!resp.ok) throw new Error('API_ERROR');
  const d = await resp.json();
  return d?.choices?.[0]?.message?.content ?? '';
}

// ==================== 工具函数 ====================
const pick = a => a[Math.floor(Math.random()*a.length)];
const norm = s => (s||'').trim();
function setMeta(el,t,l='ok'){ el.classList.remove('warn','danger'); if(l==='warn')el.classList.add('warn'); if(l==='danger')el.classList.add('danger'); el.textContent=t||''; }
function escapeHtml(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

// ==================== 国家/品类库 ====================
const COUNTRY = {
  墨西哥:{festivals:["亡灵节","独立日","返校季"],scenes:["家庭聚会","街头市集"]},
  美国:{festivals:["万圣节","黑五"],scenes:["派对","露营"]},
  英国:{festivals:["圣诞","音乐节"],scenes:["雨天通勤","下午茶"]},
  日本:{festivals:["樱花季","夏日祭"],scenes:["通勤","便利店"]}
};
const GLOBAL_F = ["周末出游","换季收纳"];
const GLOBAL_S = ["通勤路上","家庭聚会"];
const TRENDS = {
  beauty:["妆前妆后","持妆挑战"], toys:["开箱","耐玩度实测"], electronics:["开箱上手","续航实测"],
  home:["收纳改造","清洁技巧"], fashion:["一衣多穿","平替推荐"], sports:["7天挑战","动作纠错"],
  food:["三分钟快手","盲测PK"], pets:["宠物实测","日常护理"]
};
const HOOKS = ["你也有这个烦恼吗？","这个方法我晚知道一年"];
const CTAS = ["评论区告诉我","收藏这条"];
const PATTERNS = [{s:"痛点开场->方案展示->对比->CTA"},{s:"场景引入->试用->反馈->购买建议"}];
function getCountryData(c){ return COUNTRY[c]||{festivals:[...GLOBAL_F],scenes:[...GLOBAL_S]}; }
function getTrends(cat){ const k=(cat||'').toLowerCase(); if(k.includes('美妆'))return TRENDS.beauty; if(k.includes('玩具'))return TRENDS.toys; if(k.includes('3c')||k.includes('数码'))return TRENDS.electronics; if(k.includes('家居'))return TRENDS.home; if(k.includes('服饰'))return TRENDS.fashion; if(k.includes('运动'))return TRENDS.sports; if(k.includes('食品'))return TRENDS.food; if(k.includes('宠物'))return TRENDS.pets; return ["开箱反应","前后对比"]; }

// ==================== 本地模板生成 ====================
function genLocal(country, cat, tone, n){
  const d=getCountryData(country), tr=getTrends(cat), ideas=[];
  for(let i=0;i<n;i++){
    const f=pick(d.festivals), s=pick(d.scenes), t=pick(tr), p=pick(PATTERNS).s, h=pick(HOOKS), cta=pick(CTAS);
    ideas.push({title:`${f}·${s}｜${cat}:${t} #${i+1}`, pattern:p, scene1:`0-5秒:${h}`, scene2:`6-22秒:展示${cat}卖点(${t})`, scene3:`23-40秒:结果对比+反馈`, voiceover:`在${country}的${f}期间，${s}需求增多。`, cta, hashtags:`#${country} #${cat} #${f} #${t}`, prompt:`为${country}${cat}创作一个关于${f}与${t}的脚本`});
  }
  return ideas;
}

// ==================== AI生成 ====================
async function genAI(country, cat, tone, voice, n){
  const d=getCountryData(country), tr=getTrends(cat);
  const sys = "你是TikTok内容策划。必须输出严格JSON，格式：{\"ideas\":[{\"title\":\"...\",\"pattern\":\"...\",\"scene1\":\"...\",\"scene2\":\"...\",\"scene3\":\"...\",\"voiceover\":\"...\",\"cta\":\"...\",\"hashtags\":\"...\",\"prompt\":\"...\"}]}。语言自然像本地人。";
  const usr = `目标国家:${country} 品类:${cat} 风格:${tone} 口吻:${voice} 生成${n}条。可用素材-节日:${d.festivals.join('、')} 场景:${d.scenes.join('、')} 趋势:${tr.join('、')}`;
  const txt = await callAI({system:sys, user:usr, temperature:0.8, maxTokens:250*n});
  const json = JSON.parse(txt.replace(/```json|```/g,'').trim());
  return (json.ideas||[]).slice(0,n).map((x,i)=>({...x, title:x.title||`灵感#${i+1}`, pattern:x.pattern||"结构", scene1:x.scene1||"镜头1", scene2:x.scene2||"镜头2", scene3:x.scene3||"镜头3", voiceover:x.voiceover||"配音", cta:x.cta||"互动", hashtags:x.hashtags||"", prompt:x.prompt||""}));
}

function render(ideas, el){
  el.innerHTML = ideas.map(i=>`<div class="idea"><h3>${i.title}</h3><p><b>结构:</b>${i.pattern}</p><p>${i.scene1}<br>${i.scene2}<br>${i.scene3}</p><p><b>配音:</b>${i.voiceover}</p><p><b>引导:</b>${i.cta}</p><p class="muted">🏷️ ${i.hashtags}</p></div>`).join('');
}

// ==================== 按钮事件 ====================
document.getElementById('generateBtn').onclick = async ()=>{
  const country=norm(document.getElementById('country').value), cat=norm(document.getElementById('category').value);
  const n=+document.getElementById('count').value, tone=document.getElementById('tone').value;
  const mode=document.getElementById('ideaMode').value, voice=document.getElementById('ideaVoice').value;
  const status=document.getElementById('status'), result=document.getElementById('result');
  if(!country||!cat){ setMeta(status,'请填写国家和品类','warn'); return; }
  setMeta(status,'生成中…','ok');
  try {
    const ideas = mode==='local' ? genLocal(country,cat,tone,n) : await genAI(country,cat,tone,voice,n);
    render(ideas, result);
    setMeta(status,`已生成 ${ideas.length} 条`,'ok');
  } catch(e){
    const fb = genLocal(country,cat,tone,n);
    render(fb, result);
    setMeta(status,`AI调用失败，已用本地模板生成 ${fb.length} 条`,'warn');
  }
};
document.getElementById('copyBtn').onclick = ()=>{
  const cards=[...document.querySelectorAll('#result .idea')].map((c,i)=>`【灵感${i+1}】\n${c.innerText}`).join('\n---\n');
  navigator.clipboard.writeText(cards).then(()=>setMeta(document.getElementById('status'),'已复制'));
};

// ==================== 情绪分析 ====================
document.getElementById('emotionAnalyzeBtn').onclick = async ()=>{
  const comments=norm(document.getElementById('emotionInput').value);
  const s=document.getElementById('emotionStatus'), r=document.getElementById('emotionResult');
  if(!comments){ setMeta(s,'请粘贴评论','warn'); return; }
  setMeta(s,'分析中…','ok');
  try {
    const txt = await callAI({system:"你是用户洞察分析师。基于评论输出JSON：{\"positive\":0.x,\"neutral\":0.x,\"negative\":0.x,\"praises\":[\"词1\",\"词2\"],\"complaints\":[\"槽1\",\"槽2\"],\"tips\":[\"建议1\"]}", user:comments, temperature:0.2});
    const d = JSON.parse(txt.replace(/```json|```/g,'').trim());
    r.innerHTML = `<div class="kpi-grid"><div class="kpi"><div class="label">正面</div><div class="value">${Math.round((d.positive||0)*100)}%</div></div><div class="kpi"><div class="label">中性</div><div class="value">${Math.round((d.neutral||0)*100)}%</div></div><div class="kpi"><div class="label">负面</div><div class="value">${Math.round((d.negative||0)*100)}%</div></div></div><div class="idea"><h3>👍 好评关键词</h3><p>${(d.praises||[]).join('、')||'无'}</p></div><div class="idea"><h3>👎 槽点</h3><p>${(d.complaints||[]).join('、')||'无'}</p></div><div class="idea"><h3>💡 建议</h3><p>${(d.tips||[]).join('；')||'无'}</p></div>`;
    setMeta(s,'分析完成','ok');
  } catch(e){ setMeta(s,'分析失败，请重试','warn'); }
};
document.getElementById('emotionClearBtn').onclick = ()=>{ document.getElementById('emotionInput').value=''; document.getElementById('emotionResult').innerHTML=''; };

// ==================== 竞品雷达 ====================
document.getElementById('compAnalyzeBtn').onclick = async ()=>{
  const raw=norm(document.getElementById('compInput').value);
  const s=document.getElementById('compStatus'), r=document.getElementById('compResult');
  if(!raw){ setMeta(s,'请粘贴信息','warn'); return; }
  setMeta(s,'分析中…','ok');
  try {
    const txt = await callAI({system:"你是竞品分析师。基于输入输出JSON：{\"negative_pains\":[\"痛点1\",\"痛点2\"],\"attack_angles\":[\"突破口1\"],\"comparison_angles\":[\"对比角度1\"]}", user:raw, temperature:0.2});
    const d = JSON.parse(txt.replace(/```json|```/g,'').trim());
    r.innerHTML = `<div class="idea"><h3>🔍 竞品弱点</h3><ul class="list">${(d.negative_pains||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="idea"><h3>⚔️ 攻击突破口</h3><ul class="list">${(d.attack_angles||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="idea"><h3>📊 对比角度</h3><ul class="list">${(d.comparison_angles||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
    setMeta(s,'分析完成','ok');
  } catch(e){ setMeta(s,'分析失败','warn'); }
};
document.getElementById('compClearBtn').onclick = ()=>{ document.getElementById('compInput').value=''; document.getElementById('compResult').innerHTML=''; };

// ==================== 热点日历 ====================
document.getElementById('hotGenBtn').onclick = async ()=>{
  const country=norm(document.getElementById('hotCountry').value);
  const s=document.getElementById('hotStatus'), r=document.getElementById('hotResult');
  if(!country){ setMeta(s,'请填写国家','warn'); return; }
  setMeta(s,'生成中…','ok');
  try {
    const txt = await callAI({system:`你是文化秘书。为${country}整理未来7天的营销灵感日历。输出JSON：{"calendar":[{"date":"YYYY-MM-DD","theme":"主题","angles":["角度1"],"hashtags":["#tag1"]}]}`, user:country, temperature:0.4});
    const d = JSON.parse(txt.replace(/```json|```/g,'').trim());
    r.innerHTML = (d.calendar||[]).map(x=>`<div class="idea"><h3>${x.date} · ${x.theme}</h3><p><b>角度:</b>${(x.angles||[]).join('、')}</p><p class="muted">🏷️ ${(x.hashtags||[]).join(' ')}</p></div>`).join('');
    setMeta(s,'生成完成','ok');
  } catch(e){ setMeta(s,'生成失败','warn'); }
};

// ==================== 标签切换 & 弹窗 ====================
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected','false'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.setAttribute('aria-selected','true');
  document.getElementById('panel-'+t.id.replace('tab-','')).classList.add('active');
});
document.getElementById('openSettingsBtn').onclick = ()=> document.getElementById('settingsDialog').showModal();
</script>
</body>
</html>
